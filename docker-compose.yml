services:
  # ── App services (in Docker) ──────────────────────────────────────────────
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      RAILS_ENV: development
      DB_HOST: host.docker.internal       # MySQL runs on the host machine
      DB_PASSWORD: thuy425
      ES_HOST: elasticsearch:9200         # Elasticsearch runs in Docker
      REDIS_URL: redis://redis:6379/1     # Redis runs in Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: bundle exec rails server -b 0.0.0.0

  webpack:
    build: .
    ports:
      - "3035:3035"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      RAILS_ENV: development
      DB_HOST: host.docker.internal
      DB_PASSWORD: thuy425
      ES_HOST: elasticsearch:9200
      REDIS_URL: redis://redis:6379/1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ruby ./bin/webpack-dev-server

  # ── Backing services (in Docker) ──────────────────────────────────────────
  redis:
    image: redis:5-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:6.8.23
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  node_modules:
  redis_data:
  es_data:
